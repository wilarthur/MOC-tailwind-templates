<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, minimum-scale=1, maximum-scale=1" />
    <title>Image carousel</title>
    <link rel="stylesheet" href="/dist/output.css">
    <link rel="stylesheet" href="/dist/rich-text.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.13.1/font/bootstrap-icons.min.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/swiper@12/swiper-bundle.min.css" />
    <link rel="stylesheet" href="https://use.typekit.net/dyr8uak.css">
    <!-- Demo styles -->
    <style>
        :root {
            --swiper-navigation-sides-offset: -4rem;
        }

        html,
        body {
            position: relative;
            height: 100%;
        }

        body {
            background: #000;
            font-family: Helvetica Neue, Helvetica, Arial, sans-serif;
            font-size: 14px;
            color: #fff;
            margin: 0;
            padding: 0;
        }

        .swiper {
            position: static;
            width: 100%;
            height: 100%;
            max-height: 500px;
        }

        .swiper-container {
            position: relative;
        }

        .swiper-wrapper {
            max-height: 500px;
            height: 1000px;
        }

        .swiper-slide {
            text-align: center;
            font-size: 18px;
            background: #444;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .swiper-slide img {
            display: block;
            width: 100%;
            height: 100%;
            object-fit: contain;
        }

        .swiper {
            margin-left: auto;
            margin-right: auto;
        }
    </style>
</head>

<body>
    <!-- Swiper -->
    <div class="image-carousel container mx-auto">
        <h2 class="inline-block my-5 text-4xl text-moc-blue content-center font-bold">Image carousel heading</h2>
        <div class="swiper-container">
            <div class="swiper mySwiper container mx-auto">
                <div class="swiper-wrapper">
                    <div class="swiper-slide flex flex-col py-5"><img
                            src="https://loremipsum.imgix.net/GTlzd4xkx4LmWsG1Kw1BB/ad1834111245e6ee1da4372f1eb5876c/placeholder.com-1280x720.png?w=1920&q=60&auto=format,compress"
                            alt="">
                        <span class="text-moc-blue">Image caption</span>
                    </div>
                    <div class="swiper-slide flex flex-col py-5"><img
                            src="https://donaldthompson.com/wp-content/uploads/2024/10/placeholder-image-vertical.png"
                            alt="">
                        <span class="text-moc-blue">Image caption</span>
                    </div>
                    <div class="swiper-slide">Slide 3</div>
                    <div class="swiper-slide">Slide 4</div>
                    <div class="swiper-slide">Slide 5</div>
                    <div class="swiper-slide">Slide 6</div>
                    <div class="swiper-slide">Slide 7</div>
                    <div class="swiper-slide">Slide 8</div>
                    <div class="swiper-slide">Slide 9</div>
                </div>
                <div class="swiper-button-next"></div>
                <div class="swiper-button-prev"></div>
            </div>
        </div>
    </div>
    <br>




    <!-- Swiper JS -->
    <script src="https://cdn.jsdelivr.net/npm/swiper@12/swiper-bundle.min.js"></script>

    <!-- Initialize Swiper -->
    <script>
        var swiper = new Swiper(".mySwiper", {
            slidesPerView: 3,
            loop: true,
            navigation: {
                nextEl: ".swiper-button-next",
                prevEl: ".swiper-button-prev",
            },
            breakpoints: {
                640: {
                    slidesPerView: 1,
                    spaceBetween: 20,
                },
                768: {
                    slidesPerView: 2,
                    spaceBetween: 40,
                },
                1024: {
                    slidesPerView: 3,
                    spaceBetween: 50,
                },
            },
        });
    </script>
</body>

</html>
