<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Museum of Chelmsford</title>
    <link rel="stylesheet" href="/dist/output.css">
    <link rel="stylesheet" href="/dist/rich-text.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.13.1/font/bootstrap-icons.min.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/swiper@12/swiper-bundle.min.css" />
    <link rel="stylesheet" href="https://use.typekit.net/dyr8uak.css">

    <!-- Demo styles -->
    <style>
        html,
        body {
            position: relative;
            height: 100%;
        }

        .swiper {
            width: 100%;
            height: 100%;
            margin-left: auto;
            margin-right: auto;
        }


        .swiper-slide-content {
            display: flex;
            justify-content: center;
            align-items: center;
            flex-direction: column;
            padding: 50px;
            height: 100%;
        }

        .swiper-slide-content img {
            display: block;
            width: 100%;
            height: 100%;
            object-fit: contain;
        }
    </style>
</head>

<body>
    <!-- Swiper -->
    <div class="container mx-auto">
        <h2 class="inline-block my-5 text-4xl text-moc-blue content-center font-bold">Image carousel heading</h2>
        <div class="swiper imageSwiper !h-96">
            <div class="swiper-wrapper">
                <div class="swiper-slide my-auto mx-auto">
                    <div class="swiper-slide-content"><img
                            src="https://blocks.astratic.com/img/general-img-landscape.png"><span>Image caption</span>
                    </div>
                </div>
                <div class="swiper-slide my-auto mx-auto">
                    <div class="swiper-slide-content"><img
                            src="https://donaldthompson.com/wp-content/uploads/2024/10/placeholder-image-vertical.png"><span>Image
                            caption</span></div>
                </div>
                <div class="swiper-slide my-auto mx-auto">
                    <div class="swiper-slide-content"><img
                            src="https://blocks.astratic.com/img/general-img-landscape.png"><span>Image
                            caption</span>
                    </div>
                </div>
                <div class="swiper-slide my-auto mx-auto">
                    <div class="swiper-slide-content"><img
                            src="https://donaldthompson.com/wp-content/uploads/2024/10/placeholder-image-vertical.png"><span>Image
                            caption</span></div>
                </div>
                <div class="swiper-slide my-auto mx-auto">
                    <div class="swiper-slide-content"><img
                            src="https://blocks.astratic.com/img/general-img-landscape.png"><span>Image
                            caption</span>
                    </div>
                </div>
                <div class="swiper-slide my-auto mx-auto">
                    <div class="swiper-slide-content"><img
                            src="https://donaldthompson.com/wp-content/uploads/2024/10/placeholder-image-vertical.png"><span>Image
                            caption</span></div>
                </div>

            </div>
            <div class="swiper-button-next"></div>
            <div class="swiper-button-prev"></div>
        </div>
    </div>

    <!-- Swiper JS -->
    <script src="https://cdn.jsdelivr.net/npm/swiper@12/swiper-bundle.min.js"></script>

    <!-- Initialize Swiper -->
    <script>
        const swiper = new Swiper('.swiper', {
            // Optional parameters
            direction: 'horizontal',
            loop: true,
            pagination: {
                el: '.swiper-pagination',
            },
            navigation: {
                nextEl: '.swiper-button-next',
                prevEl: '.swiper-button-prev',
            },
            breakpoints: {
                640: {
                    slidesPerView: 1,
                    spaceBetween: 20,
                },
                768: {
                    slidesPerView: 2,
                    spaceBetween: 40,
                },
                1024: {
                    slidesPerView: 3,
                    spaceBetween: 50,
                },
            },
        });
    </script>
</body>

</html>
